<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw para Empresários | Painel Estratégico</title>
    <meta name="description" content="Painel estratégico inicial do projeto OpenClaw para Empresários." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Autimize</p>
          <h1>OpenClaw para Empresários</h1>
          <p class="sidebar-copy">Painel vivo para enxergar oferta, funil, ativos e próximos passos do projeto.</p>
        </div>

        <nav id="nav"></nav>

        <div class="sidebar-card">
          <span>Status atual</span>
          <strong id="status-badge"></strong>
          <small id="last-update"></small>
        </div>
      </aside>

      <main class="content">
        <section class="hero" id="hero"></section>
        <section class="metrics-grid" id="snapshot"></section>
        <section class="section" id="thesis"></section>
        <section class="section" id="offer"></section>
        <section class="section" id="funnel"></section>
        <section class="section" id="assets"></section>
        <section class="section" id="roadmap"></section>
        <section class="section" id="docs-map"></section>
        <section class="section" id="updates"></section>
      </main>
    </div>

    <script src="./data/dashboard-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
